name: Build Binaries (macOS)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zetac-macos-x64
          path: target/release/zetac

  build-arm64:
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-apple-darwin

      - name: Build release
        continue-on-error: true
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zetac-macos-arm64
          path: target/aarch64-apple-darwin/release/zetac

  deploy:
    needs: [build-x64, build-arm64]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: zetac-macos-x64
          path: bin/x64
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: zetac-macos-arm64
          path: bin/arm64
        continue-on-error: true

      - name: Stage binaries
        run: |
          if [ -f bin/x64/zetac ]; then
            mv bin/x64/zetac bin/zetac-macos-x64
            chmod +x bin/zetac-macos-x64
            echo "✅ macOS x86_64 binary built"
          fi
          if [ -f bin/arm64/zetac ]; then
            mv bin/arm64/zetac bin/zetac-macos-arm64
            chmod +x bin/zetac-macos-arm64
            echo "✅ macOS ARM64 binary built"
          fi
          ls -lh bin/zetac-macos-* 2>/dev/null || echo "⚠️ No macOS binaries produced"

      - name: Commit to main
        run: |
          git config user.name "Zeta Build Bot"
          git config user.email "builds@zeta-lang.org"
          git add bin/
          git diff --cached --quiet || git commit -m "Update macOS binaries [skip ci]"
          git push origin main
