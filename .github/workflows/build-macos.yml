name: Build Binaries (macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          brew link --overwrite llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zetac-macos-x64
          path: target/release/zetac

  build-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          brew link --overwrite llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-apple-darwin

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zetac-macos-arm64
          path: target/aarch64-apple-darwin/release/zetac

  # Deploy ARM64 independently of x64 — they use separate runners and
  # the Intel runner (macos-13) is often in limited supply.
  # Each deploy validates the binary is genuine Mach-O before committing.
  deploy-arm64:
    needs: build-arm64
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: zetac-macos-arm64
          path: bin
        continue-on-error: true

      - name: Validate and stage
        run: |
          if [ -f bin/zetac ]; then
            file_type=$(file bin/zetac)
            if echo "$file_type" | grep -qi "Mach-O"; then
              mv bin/zetac bin/zetac-macos-arm64
              chmod +x bin/zetac-macos-arm64
              echo "✅ macOS ARM64 binary validated"
              git config user.name "Zak Murphy"
              git config user.email "zak@z-lang.org"
              git add bin/zetac-macos-arm64
              git diff --cached --quiet || git commit -m "Update macOS ARM64 binary [skip ci]"
              git push origin main
              echo "✅ macOS ARM64 binary deployed"
            else
              echo "❌ macOS ARM64 binary is wrong format: $file_type"
              rm -f bin/zetac
            fi
          else
            echo "⚠️ No macOS ARM64 binary produced"
          fi

  deploy-x64:
    needs: build-x64
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: zetac-macos-x64
          path: bin
        continue-on-error: true

      - name: Validate and stage
        run: |
          if [ -f bin/zetac ]; then
            file_type=$(file bin/zetac)
            if echo "$file_type" | grep -qi "Mach-O"; then
              mv bin/zetac bin/zetac-macos-x64
              chmod +x bin/zetac-macos-x64
              echo "✅ macOS x86_64 binary validated"
              git config user.name "Zak Murphy"
              git config user.email "zak@z-lang.org"
              git add bin/zetac-macos-x64
              if git diff --cached --quiet; then
                echo "No changes (binary unchanged)"
              else
                git commit -m "Update macOS x86_64 binary [skip ci]"
                git push origin main
                echo "✅ macOS x86_64 binary deployed"
              fi
            else
              echo "❌ macOS x86_64 binary is wrong format: $file_type"
              rm -f bin/zetac
            fi
          else
            echo "⚠️ No macOS x86_64 binary produced"
          fi
