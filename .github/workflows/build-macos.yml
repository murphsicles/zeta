# .github/workflows/build-macos.yml
# Builds zetac binaries for macOS, commits them to bin/ on main.
name: Build Binaries (macOS)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: zetac
            bin_name: zetac-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: zetac
            bin_name: zetac-macos-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bootstrap

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Stage binaries
        run: |
          mkdir -p bin
          for src in zetac-macos-arm64/* zetac-macos-x64/*; do
            [ -f "$src" ] && cp "$src" "bin/$(basename $src)"
          done
          chmod +x bin/* 2>/dev/null || true
          ls -lh bin/

      - name: Commit to main
        run: |
          git config user.name "Zeta Build Bot"
          git config user.email "builds@zeta-lang.org"
          git add bin/
          git diff --cached --quiet || git commit -m "Update macOS binaries"
          git push origin main
