name: Build Binaries (macOS)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bootstrap

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zetac-macos-x64
          path: target/release/zetac

  build-arm64:
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bootstrap

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-apple-darwin

      - name: Build release
        continue-on-error: true
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zetac-macos-arm64
          path: target/aarch64-apple-darwin/release/zetac

  deploy-x64:
    needs: build-x64
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: zetac-macos-x64
          path: bin
        continue-on-error: true

      - name: Stage and commit
        run: |
          if [ -f bin/zetac ]; then
            mv bin/zetac bin/zetac-macos-x64
            chmod +x bin/zetac-macos-x64
            ls -lh bin/zetac-macos-x64
            git config user.name "Zeta Build Bot"
            git config user.email "builds@zeta-lang.org"
            git add bin/zetac-macos-x64
            git diff --cached --quiet || git commit -m "Update macOS x86_64 binary [skip ci]"
            git push origin main
            echo "✅ macOS x86_64 binary deployed"
          else
            echo "⚠️ No macOS x86_64 binary produced"
          fi

  deploy-arm64:
    needs: build-arm64
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: zetac-macos-arm64
          path: bin
        continue-on-error: true

      - name: Stage and commit
        run: |
          if [ -f bin/zetac ]; then
            mv bin/zetac bin/zetac-macos-arm64
            chmod +x bin/zetac-macos-arm64
            ls -lh bin/zetac-macos-arm64
            git config user.name "Zeta Build Bot"
            git config user.email "builds@zeta-lang.org"
            git add bin/zetac-macos-arm64
            git diff --cached --quiet || git commit -m "Update macOS ARM64 binary [skip ci]"
            git push origin main
            echo "✅ macOS ARM64 binary deployed"
          else
            echo "⚠️ No macOS ARM64 binary produced"
          fi
