name: Build Binaries (macOS)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bootstrap

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          brew link --overwrite llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zetac-macos-x64
          path: target/release/zetac

  build-arm64:
    runs-on: macos-14
    # Best-effort: ARM64 runners are scarce and the build may fail.
    # We do NOT use continue-on-error so failures are visible in the UI.
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bootstrap

      - name: Install LLVM 21
        run: |
          brew install llvm@21
          brew link --overwrite llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-apple-darwin

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zetac-macos-arm64
          path: target/aarch64-apple-darwin/release/zetac

  deploy:
    needs: [build-x64, build-arm64]
    # Always run deploy so x64 gets pushed even when arm64 fails
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # --- x86_64 binary ---
      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: zetac-macos-x64
          path: bin
        continue-on-error: true

      - name: Validate and stage x86_64 binary
        run: |
          if [ -f bin/zetac ]; then
            file_type=$(file bin/zetac)
            if echo "$file_type" | grep -qi "Mach-O"; then
              mv bin/zetac bin/zetac-macos-x64
              chmod +x bin/zetac-macos-x64
              echo "✅ macOS x86_64 binary validated and staged"
            else
              echo "❌ macOS x86_64 binary is wrong format: $file_type"
              rm -f bin/zetac
            fi
          else
            echo "⚠️ No macOS x86_64 binary produced"
          fi

      # --- ARM64 binary ---
      # Sequentially download so we avoid file name collision: after x64 is
      # renamed to zetac-macos-x64, bin/zetac is free for the ARM64 artifact.
      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: zetac-macos-arm64
          path: bin
        continue-on-error: true

      - name: Validate and stage ARM64 binary
        run: |
          if [ -f bin/zetac ]; then
            file_type=$(file bin/zetac)
            if echo "$file_type" | grep -qi "Mach-O"; then
              mv bin/zetac bin/zetac-macos-arm64
              chmod +x bin/zetac-macos-arm64
              echo "✅ macOS ARM64 binary validated and staged"
            else
              echo "❌ macOS ARM64 binary is wrong format: $file_type"
              rm -f bin/zetac
            fi
          else
            echo "⚠️ No macOS ARM64 binary produced"
          fi

      - name: Commit and push
        run: |
          git add bin/zetac-macos-x64 2>/dev/null || true
          git add bin/zetac-macos-arm64 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git config user.name "Zak Murphy"
            git config user.email "zak@z-lang.org"
            git commit -m "Update macOS binaries [skip ci]"
            git push origin main
            echo "✅ macOS binaries deployed"
          fi
