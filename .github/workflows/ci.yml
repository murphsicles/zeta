# .github/workflows/ci.yml: CI for Zeta (build/test/lint)
name: CI
on:
  push:
    branches: [ main, v0.3.8, dev ]
  pull_request:
    branches: [ main, v0.3.8, dev ]
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [nightly] # 2024 edition requires nightly (stable post-2024)
    steps:
    - uses: actions/checkout@v4
    - name: Install LLVM 21.1 for inkwell compatibility
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get update
        sudo apt-get install -y llvm-21 llvm-21-dev llvm-21-tools libpolly-21-dev
        # Also install 21.1 components for inkwell llvm21-1 feature
        sudo apt-get install -y llvm-21.1 llvm-21.1-dev llvm-21.1-tools
    - name: Set LLVM prefix
      run: |
        echo "LLVM_SYS_210_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
        echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21.1" >> $GITHUB_ENV
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.toolchain }}
        components: rustfmt, clippy
    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Check
      run: cargo check --workspace --all-features --all-targets
    - name: Clippy
      run: cargo clippy --workspace --all-features --all-targets -- -D warnings
    - name: Fmt
      run: cargo fmt --all -- --check
  test:
    runs-on: ubuntu-latest
    needs: check
    steps:
    - uses: actions/checkout@v4
    - name: Install LLVM 21.1 for inkwell compatibility
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get update
        sudo apt-get install -y llvm-21 llvm-21-dev llvm-21-tools libpolly-21-dev
        # Also install 21.1 components for inkwell llvm21-1 feature
        sudo apt-get install -y llvm-21.1 llvm-21.1-dev llvm-21.1-tools
    - name: Set LLVM prefix
      run: |
        echo "LLVM_SYS_210_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
        echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21.1" >> $GITHUB_ENV
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly
        components: rustfmt, clippy
    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Run Rust tests
      run: cargo test --workspace --all-features
    - name: Build release compiler
      run: cargo build --release
    - name: Install PowerShell Core
      run: |
        # Install PowerShell Core using Microsoft repository
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https software-properties-common
        wget -q https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb
        sudo dpkg -i packages-microsoft-prod.deb
        sudo apt-get update
        sudo apt-get install -y powershell
    - name: Run Zeta tests
      run: pwsh -ExecutionPolicy Bypass -File scripts/run_zeta_tests.ps1
    - name: Bench (no plot)
      run: cargo bench --no-run # Stub: Run benches
  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly
    - name: Audit deps
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check licenses
        log-level: warn
        arguments: --no-default-features
        manifest-path: ./Cargo.toml
