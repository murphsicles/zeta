name: CI Simple

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify Bootstrap Chain
      shell: pwsh
      run: |
        # Verify bootstrap chain from v0.3.8 to v0.3.13
        Write-Host "Verifying Zeta Bootstrap Chain..." -ForegroundColor Green
        
        # Check all release files exist
        $releases = @(
            @{Version="v0.3.8"; Files=@("RELEASE_v0.3.8.md", "zetac0.3.8.exe", "ultra_minimal_bootstrap.z")},
            @{Version="v0.3.9"; Files=@("RELEASE_v0.3.9_PROPER.md", "zetac-v0.3.9-translated.exe", "v0_3_9_TRANSLATED.z")},
            @{Version="v0.3.10"; Files=@("RELEASE_v0.3.10_PROPER.md", "zetac-v0.3.10-simple.exe", "v0_3_10_SIMPLE.z")},
            @{Version="v0.3.11"; Files=@("RELEASE_v0.3.11_WIKIPEDIA.md", "zetac-v0.3.11-simple.exe", "v0_3_11_SIMPLE_WIKI.z")},
            @{Version="v0.3.12"; Files=@("RELEASE_v0.3.12_WIKIPEDIA.md", "zetac-v0.3.12-simple.exe", "v0_3_12_SIMPLE_EXPR.z")},
            @{Version="v0.3.13"; Files=@("RELEASE_v0.3.13_WIKIPEDIA.md", "zetac-v0.3.13-simple.exe", "v0_3_13_SIMPLE_TYPE.z")}
        )
        
        $allPassed = $true
        
        foreach ($release in $releases) {
            $version = $release.Version
            Write-Host "`nChecking $version..." -ForegroundColor Cyan
            
            $missingFiles = @()
            foreach ($file in $release.Files) {
                if (Test-Path $file) {
                    $size = (Get-Item $file).Length
                    Write-Host "  ✅ $file ($size bytes)"
                } else {
                    Write-Host "  ❌ $file (MISSING)" -ForegroundColor Red
                    $missingFiles += $file
                }
            }
            
            if ($missingFiles.Count -gt 0) {
                Write-Host "  ❌ $version FAILED: Missing files" -ForegroundColor Red
                $allPassed = $false
            } else {
                Write-Host "  ✅ $version PASSED" -ForegroundColor Green
            }
        }
        
        # Check bootstrap chain continuity
        Write-Host "`nChecking Bootstrap Chain Continuity..." -ForegroundColor Cyan
        
        $chain = @("v0.3.8", "v0.3.9", "v0.3.10", "v0.3.11", "v0.3.12", "v0.3.13")
        $chainValid = $true
        
        for ($i = 0; $i -lt $chain.Count - 1; $i++) {
            $current = $chain[$i]
            $next = $chain[$i + 1]
            
            # Check if both versions exist
            $currentExists = $releases | Where-Object { $_.Version -eq $current } | ForEach-Object {
                $missing = 0
                foreach ($file in $_.Files) {
                    if (-not (Test-Path $file)) { $missing++ }
                }
                $missing -eq 0
            }
            
            $nextExists = $releases | Where-Object { $_.Version -eq $next } | ForEach-Object {
                $missing = 0
                foreach ($file in $_.Files) {
                    if (-not (Test-Path $file)) { $missing++ }
                }
                $missing -eq 0
            }
            
            if ($currentExists -and $nextExists) {
                Write-Host "  ✅ $current → $next"
            } else {
                Write-Host "  ❌ $current → $next (chain broken)" -ForegroundColor Red
                $chainValid = $false
            }
        }
        
        # Final result
        Write-Host "`n" + ("=" * 50) -ForegroundColor Yellow
        if ($allPassed -and $chainValid) {
            Write-Host "✅ ALL RELEASES VERIFIED" -ForegroundColor Green
            Write-Host "✅ BOOTSTRAP CHAIN INTACT" -ForegroundColor Green
            Write-Host "Total releases verified: $($releases.Count)" -ForegroundColor Cyan
        } else {
            Write-Host "❌ VERIFICATION FAILED" -ForegroundColor Red
            if (-not $allPassed) {
                Write-Host "  - Missing release files" -ForegroundColor Red
            }
            if (-not $chainValid) {
                Write-Host "  - Bootstrap chain broken" -ForegroundColor Red
            }
            exit 1
        }
        Write-Host ("=" * 50) -ForegroundColor Yellow