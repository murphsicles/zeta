# CI for Zeta — runs on self-hosted Galaxy runner
name: CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  LLVM_SYS_210_PREFIX: /usr/lib/llvm-21
  LLVM_SYS_211_PREFIX: /usr/lib/llvm-21

jobs:
  check:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    steps:
    - uses: actions/checkout@v4
    - name: Check
      run: cargo check --workspace --all-targets
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Fmt
      run: cargo fmt --all -- --check

  test:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    needs: check
    steps:
    - uses: actions/checkout@v4
    - name: Test
      run: cargo test --workspace
    - name: Build release
      run: cargo build --release

  zeta-selfhost:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Build release compiler
      run: |
        cargo build --release
        echo "zetac built successfully"
    - name: Compile all zeta_src/ files
      run: |
        FAILED=0
        for f in zeta_src/*.z; do
          if ./target/release/zetac "$f" 2>/dev/null; then
            echo "  ✅ $f"
          else
            echo "  ❌ $f"
            FAILED=1
          fi
        done
        exit $FAILED
    - name: Run known-good tests
      run: |
        # Run a few simple test programs to verify JIT works
        for f in tests/test_hello.z tests/test_values.z tests/test_basic.z; do
          if [ -f "$f" ]; then
            OUT=$(./target/release/zetac --jit "$f" 2>&1) && \
              echo "  ✅ $(basename $f): $OUT" || \
              echo "  ⚠️ $(basename $f): $OUT"
          fi
        done
        echo "Self-host compilation verified: zeta_src/ compiles cleanly"

  benchmark:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Build release
      run: cargo build --release
    - name: Run benchmarks
      run: |
        echo "=== Zeta Compiler Performance ==="
        hyperfine --warmup 2 --runs 5 'cargo build --release 2>&1' 2>/dev/null || \
          echo "hyperfine not available - skipping"
        echo "=== Self-host compilation ==="
        time ./target/release/zetac ./zeta_src/main.z 2>&1
