name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup
      run: |
        echo "Zeta Compiler CI - Testing bootstrap progress"
        echo "Current focus: Extending v0.3.7 to parse generic types"
        echo "Baseline: v0.3.7 parses 635/5300 chars of src/main.z"
        
    - name: List project structure
      run: |
        echo "=== PROJECT STRUCTURE ==="
        dir /s /b *.z | head -20
        echo ""
        echo "=== KEY FILES ==="
        if exist src\main.z (
          echo "src/main.z exists"
        ) else (
          echo "ERROR: src/main.z missing"
          exit 1
        )
        
    - name: Verify bootstrap source integrity
      run: |
        echo "=== BOOTSTRAP SOURCE VERIFICATION ==="
        if exist src\main.z (
          echo "Bootstrap source present"
        ) else (
          echo "ERROR: No bootstrap source"
          exit 1
        )
        
    - name: Phase 1 - Type Alias Bridge Test
      run: |
        echo "=== PHASE 1: TYPE ALIAS BRIDGE ==="
        echo "Testing if type aliases provide workaround for v0.3.7"
        if exist src\type_system\generic_aliases.z (
          echo "✅ generic_aliases.z exists"
        ) else (
          echo "❌ generic_aliases.z missing"
        )
        
    - name: Phase 2 - Parser Analysis Test  
      run: |
        echo "=== PHASE 2: PARSER ANALYSIS ==="
        echo "Testing parser limitation understanding"
        if exist tests\phase1\phase1_diagnostic.z (
          echo "✅ phase1_diagnostic.z exists"
        ) else (
          echo "⚠️ phase1_diagnostic.z missing"
        )
        
    - name: Summary
      run: |
        echo "=== CI SUMMARY ==="
        echo "Status: Bootstrap analysis in progress"
        echo "Current capability: v0.3.7 with type alias workaround"
        echo "Next phase: Create minimal parser extension"
        echo ""
        echo "PUBLIC ACCOUNTABILITY:"
        echo "- All work must be pushed to GitHub"
        echo "- CI must pass for progress to count"
        echo "- No theoretical successes, only verified work"