# Simple test workflow to check if GitHub Actions works
name: Test CI
on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - run: echo "GitHub Actions is working! Current time: $(date)"
    - run: echo "Testing CI pipeline..."
    - run: echo "System info:"
    - run: uname -a
    - run: echo "Test workflow executed successfully at $(date)"