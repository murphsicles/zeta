name: Build Binaries (Linux + Windows)

env:
  LLVM_SYS_210_PREFIX: /usr/lib/llvm-21
  LLVM_SYS_211_PREFIX: /usr/lib/llvm-21

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: zetac-linux
          path: target/release/zetac

  windows:
    runs-on: windows-2022
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        shell: pwsh
        run: |
          # Download pre-built clang+llvm for Windows (has llvm-config.exe)
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/clang+llvm-21.1.0-x86_64-pc-windows-msvc.tar.xz"
          $out = "$env:TEMP\llvm.tar.xz"
          Write-Host "Downloading clang+llvm 21.1.0 (900MB)..."
          curl.exe -sL $url -o $out
          Write-Host "Extracting with tar..."
          $targetDir = "C:\LLVM"
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          tar -xf "$out" -C "$targetDir" --strip-components=1
          Write-Host "Looking for llvm-config.exe..."
          $cfg = Get-ChildItem $targetDir -Recurse -Filter "llvm-config.exe" | Select-Object -First 1
          if ($cfg) {
            $ver = & $cfg.FullName --version
            $prefixDir = Resolve-Path (Join-Path $cfg.Directory.FullName "..")
            Write-Host "LLVM $ver at $($cfg.DirectoryName)"
            echo "LLVM_SYS_211_PREFIX=$prefixDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "$(Join-Path $prefixDir 'bin')" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Host "Contents of $targetDir (top 3 levels):"
            Get-ChildItem $targetDir -Depth 2 -Name | Select-Object -First 50
            throw "llvm-config.exe not found"
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zetac-windows
          path: target/x86_64-pc-windows-msvc/release/zetac.exe

  deploy:
    needs: [linux, windows]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: zetac-linux
          path: bin

      - name: Download Windows artifact
        if: success()
        uses: actions/download-artifact@v8
        with:
          name: zetac-windows
          path: bin
        continue-on-error: true

      - name: Stage binaries
        run: |
          chmod +x bin/zetac 2>/dev/null || true
          ls -lh bin/

      - name: Commit to main
        run: |
          git config user.name "Zak Murphy"
          git config user.email "zak@z-lang.org"
          git add bin/
          git diff --cached --quiet || git commit -m "Update pre-built binaries [skip ci]"
          git push origin main
