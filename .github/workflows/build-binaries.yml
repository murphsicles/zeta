name: Build Binaries (Linux + Windows)

env:
  LLVM_SYS_210_PREFIX: /usr/lib/llvm-21
  LLVM_SYS_211_PREFIX: /usr/lib/llvm-21

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: zetac-linux
          path: target/release/zetac

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        shell: pwsh
        run: |
          # ── Method 1: Check known paths for pre-installed LLVM 21 ──
          $knownPaths = @(
            "C:\Program Files\LLVM",
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm"
          )
          foreach ($p in $knownPaths) {
            $cfg = Join-Path $p "bin\llvm-config.exe"
            if (Test-Path $cfg) {
              $ver = & $cfg --version 2>`$null
              if ($ver -match '^21\.') {
                Write-Host "✅ Found LLVM 21 at $p"
                "LLVM_SYS_211_PREFIX=$p" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                "$(Join-Path $p 'bin')" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                exit 0
              }
            }
          }

          # ── Method 2: Install via chocolatey with version pin ──
          Write-Host "Trying choco install llvm (version-pinned)"
          $chocoResult = choco install llvm --version 21.1.8 --no-progress -y 2>&1 | Out-String
          if ($LASTEXITCODE -eq 0) {
            # Wait a moment for the install to settle
            Start-Sleep -Seconds 10
            $cfg = Get-ChildItem "${env:ProgramFiles}" -Recurse -Filter "llvm-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $cfg) {
              $cfg = Get-ChildItem "${env:ProgramFiles(x86)}" -Recurse -Filter "llvm-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if ($cfg) {
              $ver = & $cfg.FullName --version 2>`$null
              $dir = Resolve-Path (Join-Path $cfg.Directory.FullName '..')
              "LLVM_SYS_211_PREFIX=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "$(Join-Path $dir 'bin')" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "✅ choco installed LLVM $ver at $dir"
              exit 0
            }
          } else {
            Write-Host "⚠️ choco install failed: $chocoResult"
          }

          # ── Method 3: Direct download from LLVM GitHub releases ──
          Write-Host "Downloading LLVM 21 installer from GitHub..."
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/LLVM-21.1.8-win64.exe"
          $installer = "$env:TEMP\LLVM-21.1.8-win64.exe"
          try {
            Invoke-WebRequest -Uri $llvmUrl -OutFile $installer -UseBasicParsing -TimeoutSec 120
            Write-Host "Starting silent install..."
            # /S = silent, /D=path = target dir
            $installDir = "C:\Program Files\LLVM-21"
            Start-Process -FilePath $installer -ArgumentList "/S", "/D=$installDir" -Wait -NoNewWindow
            Start-Sleep -Seconds 10
            $cfg = Join-Path $installDir "bin\llvm-config.exe"
            if (Test-Path $cfg) {
              $ver = & $cfg --version 2>`$null
              "LLVM_SYS_211_PREFIX=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "$(Join-Path $installDir 'bin')" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "✅ Direct install of LLVM $ver at $installDir"
              exit 0
            }
          } catch {
            Write-Host "⚠️ Direct download failed: $_"
          }

          # ── Method 4: Try winget as last resort ──
          Write-Host "Trying winget install LLVM..."
          $wingetResult = winget install "LLVM" --silent --accept-package-agreements 2>&1 | Out-String
          Write-Host $wingetResult
          $cfg = Get-ChildItem "${env:ProgramFiles}" -Recurse -Filter "llvm-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cfg) {
            $ver = & $cfg.FullName --version 2>`$null
            $dir = Resolve-Path (Join-Path $cfg.Directory.FullName '..')
            if ($ver -match '^21\.') {
              "LLVM_SYS_211_PREFIX=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "$(Join-Path $dir 'bin')" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "✅ winget installed LLVM $ver at $dir"
              exit 0
            }
          }

          throw "Could not install LLVM 21 — tried choco, direct download, and winget"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zetac-windows
          path: target/x86_64-pc-windows-msvc/release/zetac.exe

  deploy-linux:
    needs: [linux]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: zetac-linux
          path: bin

      - name: Commit Linux binary
        run: |
          chmod +x bin/zetac
          ls -lh bin/
          git config user.name "Zak Murphy"
          git config user.email "zak@z-lang.org"
          git add bin/zetac
          git diff --cached --quiet || git commit -m "Update Linux binary [skip ci]"
          git push origin main

  deploy-windows:
    needs: [windows]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: zetac-windows
          path: bin

      - name: Commit Windows binary
        run: |
          ls -lh bin/
          git config user.name "Zak Murphy"
          git config user.email "zak@z-lang.org"
          git add bin/zetac.exe
          git diff --cached --quiet || git commit -m "Update Windows binary [skip ci]"
          git push origin main
