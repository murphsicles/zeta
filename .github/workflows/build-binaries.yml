name: Build Binaries (Linux + Windows)

env:
  LLVM_SYS_210_PREFIX: /usr/lib/llvm-21
  LLVM_SYS_211_PREFIX: /usr/lib/llvm-21

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: zetac-linux
          path: target/release/zetac

  windows:
    runs-on: windows-latest
    # Windows builds are best-effort (LLVM via vcpkg is slow and flaky).
    # Failures are visible so we know when something's wrong.
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        shell: pwsh
        run: |
          # Search common paths for LLVM 21.x
          $prefixes = @(
            "C:\Program Files\LLVM",
            "${env:ProgramFiles}\LLVM",
            "${env:VCPKG_ROOT}\installed\x64-windows"
          )
          $found = $false
          foreach ($p in $prefixes) {
            $exe = Join-Path $p "bin\llvm-config.exe"
            if (Test-Path $exe) {
              $ver = & $exe --version 2>`$null
              Write-Host "LLVM at $p: $ver"
              if ($ver -match '^21\.') {
                Write-Host "Found LLVM 21 at $p"
                echo "LLVM_SYS_211_PREFIX=$p" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                $found = $true
                break
              }
            }
          }
          if (-not $found) {
            Write-Host "LLVM 21 not found. Installing via vcpkg..."
            vcpkg install llvm:x64-windows
            $vp = "${env:VCPKG_ROOT}\installed\x64-windows"
            $vexe = Join-Path $vp "bin\llvm-config.exe"
            if (Test-Path $vexe) {
              echo "LLVM_SYS_211_PREFIX=$vp" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Host "LLVM 21 installed at $vp"
            } else {
              Write-Host "::error::Failed to install LLVM 21 on Windows"
              exit 1
            }
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zetac-windows
          path: target/x86_64-pc-windows-msvc/release/zetac.exe

  deploy:
    needs: [linux, windows]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: zetac-linux
          path: bin

      - name: Download Windows artifact
        if: success()
        uses: actions/download-artifact@v8
        with:
          name: zetac-windows
          path: bin
        continue-on-error: true

      - name: Stage binaries
        run: |
          chmod +x bin/zetac 2>/dev/null || true
          ls -lh bin/

      - name: Commit to main
        run: |
          git config user.name "Zak Murphy"
          git config user.email "zak@z-lang.org"
          git add bin/
          git diff --cached --quiet || git commit -m "Update pre-built binaries [skip ci]"
          git push origin main
