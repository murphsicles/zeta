name: Build Binaries (Linux + Windows)

env:
  LLVM_SYS_210_PREFIX: /usr/lib/llvm-21
  LLVM_SYS_211_PREFIX: /usr/lib/llvm-21

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: zetac-linux
          path: target/release/zetac

  windows:
    runs-on: windows-latest
    # Windows builds are best-effort (LLVM via vcpkg is slow and flaky).
    # Failures are visible so we know when something's wrong.
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        shell: pwsh
        run: |
          # Check if LLVM 21 is already available
          $cfg = Get-Command "llvm-config.exe" -ErrorAction SilentlyContinue
          if ($cfg) {
            $ver = & $cfg --version
            if ($ver -match '^21\.') {
              $prefix = & $cfg --prefix
              echo "LLVM_SYS_211_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              exit 0
            }
          }
          # Bootstrap vcpkg and install LLVM
          Write-Host "Bootstrapping vcpkg..."
          & "${env:VCPKG_ROOT}\vcpkg" bootstrap
          Write-Host "Installing LLVM via vcpkg (this will take a while)..."
          & "${env:VCPKG_ROOT}\vcpkg" install llvm:x64-windows
          $vcpkgDir = "${env:VCPKG_ROOT}\installed\x64-windows"
          $cfg2 = Join-Path $vcpkgDir "tools\llvm\llvm-config.exe"
          if (-not (Test-Path $cfg2)) {
            $cfg2 = Join-Path $vcpkgDir "bin\llvm-config.exe"
          }
          if (Test-Path $cfg2) {
            $ver2 = & $cfg2 --version 2>`$null
            Write-Host "LLVM $ver2 installed at $(Split-Path $cfg2 -Parent)"
            echo "LLVM_SYS_211_PREFIX=${env:VCPKG_ROOT}\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "::error::llvm-config.exe not found after vcpkg install"
            Get-ChildItem "${env:VCPKG_ROOT}\installed\x64-windows" -Recurse -Filter "*.exe" -Name | Select-Object -First 30
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zetac-windows
          path: target/x86_64-pc-windows-msvc/release/zetac.exe

  deploy:
    needs: [linux, windows]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: zetac-linux
          path: bin

      - name: Download Windows artifact
        if: success()
        uses: actions/download-artifact@v8
        with:
          name: zetac-windows
          path: bin
        continue-on-error: true

      - name: Stage binaries
        run: |
          chmod +x bin/zetac 2>/dev/null || true
          ls -lh bin/

      - name: Commit to main
        run: |
          git config user.name "Zak Murphy"
          git config user.email "zak@z-lang.org"
          git add bin/
          git diff --cached --quiet || git commit -m "Update pre-built binaries [skip ci]"
          git push origin main
