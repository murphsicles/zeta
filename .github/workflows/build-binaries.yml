name: Build Binaries (Linux + Windows)

env:
  LLVM_SYS_210_PREFIX: /usr/lib/llvm-21
  LLVM_SYS_211_PREFIX: /usr/lib/llvm-21

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: zetac-linux
          path: target/release/zetac

  windows:
    runs-on: windows-latest
    # Windows builds are best-effort (LLVM via vcpkg is slow and flaky).
    # Failures are visible so we know when something's wrong.
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        shell: pwsh
        run: |
          # Check if LLVM 21 is already installed in common paths
          $candidates = @(
            "C:\Program Files\LLVM",
            "${env:ProgramFiles}\LLVM",
            "${env:VCPKG_ROOT}\installed\x64-windows"
          )
          foreach ($dir in $candidates) {
            $cfg = Join-Path $dir "bin\llvm-config.exe"
            if (Test-Path $cfg) {
              $ver = & $cfg --version 2>`$null
              if ($ver -match '^21\.') {
                Write-Host "Found LLVM 21 at $dir"
                echo "LLVM_SYS_211_PREFIX=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                echo "$dir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                exit 0
              }
            }
          }
          # Download LLVM 21.1.0 and extract with 7-Zip
          Write-Host "Downloading LLVM 21.1.0..."
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/LLVM-21.1.0-win64.exe"
          $out = "$env:TEMP\llvm-installer.exe"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Extracting LLVM with 7-Zip..."
          & "C:\Program Files\7-Zip\7z.exe" x "$out" -o"$env:ProgramFiles\LLVM" -y -bso0 | Out-Null
          $installed = "$env:ProgramFiles\LLVM"
          $cfg2 = Join-Path $installed "bin\llvm-config.exe"
          if (Test-Path $cfg2) {
            $ver2 = & $cfg2 --version 2>`$null
            Write-Host "LLVM extracted: $ver2"
            echo "LLVM_SYS_211_PREFIX=$installed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "$installed\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Host "::error::llvm-config.exe not found after extraction"
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zetac-windows
          path: target/x86_64-pc-windows-msvc/release/zetac.exe

  deploy:
    needs: [linux, windows]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: zetac-linux
          path: bin

      - name: Download Windows artifact
        if: success()
        uses: actions/download-artifact@v8
        with:
          name: zetac-windows
          path: bin
        continue-on-error: true

      - name: Stage binaries
        run: |
          chmod +x bin/zetac 2>/dev/null || true
          ls -lh bin/

      - name: Commit to main
        run: |
          git config user.name "Zak Murphy"
          git config user.email "zak@z-lang.org"
          git add bin/
          git diff --cached --quiet || git commit -m "Update pre-built binaries [skip ci]"
          git push origin main
