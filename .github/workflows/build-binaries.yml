name: Build Binaries (Linux + Windows)

env:
  LLVM_SYS_210_PREFIX: /usr/lib/llvm-21
  LLVM_SYS_211_PREFIX: /usr/lib/llvm-21

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: [self-hosted, galaxy, wsl2, x86-64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: zetac-linux
          path: target/release/zetac

  windows:
    runs-on: windows-latest
    # Windows builds are best-effort (LLVM via vcpkg is slow and flaky).
    # Failures are visible so we know when something's wrong.
    steps:
      - uses: actions/checkout@v6
        with:
          ref: bootstrap

      - name: Install LLVM 21
        shell: pwsh
        run: |
          # Check if LLVM is already available
          $llvmConfig = Get-Command "llvm-config.exe" -ErrorAction SilentlyContinue
          if ($llvmConfig) {
              $version = & $llvmConfig.Source --version
              Write-Host "LLVM found: $version at $($llvmConfig.Source)"
              $prefix = & $llvmConfig.Source --prefix
              Write-Host "LLVM_SYS_211_PREFIX=$prefix"
              echo "LLVM_SYS_211_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
              Write-Host "LLVM not found. Downloading LLVM 21.1.0..."
              $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/LLVM-21.1.0-win64.exe"
              $out = "$env:TEMP\llvm-installer.exe"
              Invoke-WebRequest -Uri $url -OutFile $out
              Write-Host "Installing LLVM..."
              & $out /S
              Write-Host "Waiting for install to complete..."
              Start-Sleep -Seconds 10
              # Try to find it after install
              $llvmConfig = Get-Command "llvm-config.exe" -ErrorAction SilentlyContinue
              if ($llvmConfig) {
                  $prefix = & $llvmConfig.Source --prefix
                  Write-Host "LLVM installed at: $prefix"
                  echo "LLVM_SYS_211_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              } else {
                  # Fall back to default path
                  $defaultPath = "C:\Program Files\LLVM"
                  if (Test-Path $defaultPath) {
                      Write-Host "Using default LLVM path: $defaultPath"
                      echo "LLVM_SYS_211_PREFIX=$defaultPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  } else {
                      Write-Host "LLVM not found after install. Trying vcpkg..."
                      # Final fallback: try vcpkg without clean-after-build
                      vcpkg install llvm[core,wasm]:x64-windows
                      echo "LLVM_SYS_211_PREFIX=$env:VCPKG_ROOT\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  }
              }
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zetac-windows
          path: target/x86_64-pc-windows-msvc/release/zetac.exe

  deploy:
    needs: [linux, windows]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: zetac-linux
          path: bin

      - name: Download Windows artifact
        if: success()
        uses: actions/download-artifact@v8
        with:
          name: zetac-windows
          path: bin
        continue-on-error: true

      - name: Stage binaries
        run: |
          chmod +x bin/zetac 2>/dev/null || true
          ls -lh bin/

      - name: Commit to main
        run: |
          git config user.name "Zak Murphy"
          git config user.email "zak@z-lang.org"
          git add bin/
          git diff --cached --quiet || git commit -m "Update pre-built binaries [skip ci]"
          git push origin main
