name: Accountability Check

on:
  schedule:
    # Check every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  check-activity:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history
    
    - name: Check Recent Activity
      id: check
      run: |
        echo "Checking for recent commits..."
        
        # Get last commit timestamp
        LAST_COMMIT=$(git log -1 --pretty=format:"%ct")
        CURRENT_TIME=$(date +%s)
        HOURS_SINCE=$(( (CURRENT_TIME - LAST_COMMIT) / 3600 ))
        
        echo "Last commit: $(git log -1 --pretty=format:"%ad" --date=relative)"
        echo "Hours since last commit: $HOURS_SINCE"
        
        # Check for recent file changes in source directory
        RECENT_FILES=$(find . -name "*.z" -o -name "*.py" -o -name "*.md" | \
          xargs -I {} sh -c 'test $(date +%s -r "{}") -gt $(date +%s --date="6 hours ago") && echo "{}"' | wc -l)
        
        echo "Files modified in last 6 hours: $RECENT_FILES"
        
        # Set outputs
        echo "hours_since=$HOURS_SINCE" >> $GITHUB_OUTPUT
        echo "recent_files=$RECENT_FILES" >> $GITHUB_OUTPUT
        
        # Fail if no activity in 6 hours
        if [ $HOURS_SINCE -gt 6 ] && [ $RECENT_FILES -eq 0 ]; then
          echo "❌ NO ACTIVITY IN 6+ HOURS"
          echo "::error::Accountability check failed: No commits or file changes in 6+ hours"
          exit 1
        else
          echo "✅ Activity detected"
        fi
    
    - name: Generate Status Report
      if: always()
      run: |
        echo "## Accountability Status Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Last 5 Commits:**" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        git log --oneline -5 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Recent File Changes:**" >> $GITHUB_STEP_SUMMARY
        find . -name "*.z" -o -name "*.py" -o -name "*.md" | \
          xargs -I {} sh -c 'echo "{} - $(date -r {} "+%Y-%m-%d %H:%M")"' | \
          sort -k2 -r | head -10 >> $GITHUB_STEP_SUMMARY