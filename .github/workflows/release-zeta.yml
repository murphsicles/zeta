name: Release Zeta Compiler
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual triggering

jobs:
  release-zeta:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for changelog generation
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install LLVM 21 (required for Zeta compilation)
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get update
        sudo apt-get install -y llvm-21 llvm-21-dev llvm-21-tools libpolly-21-dev
    
    - name: Set LLVM environment variables
      run: |
        echo "LLVM_SYS_210_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
        echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
    
    - name: Build Zeta compiler
      run: cargo build --release --bin zetac
    
    - name: Test Zeta compiler
      run: cargo test --release
    
    - name: Package Zeta source
      run: |
        # Create a clean package of Zeta source files
        mkdir -p dist/zeta-source
        cp -r zeta_src/* dist/zeta-source/
        cp README.md dist/zeta-source/
        cp LICENSE dist/zeta-source/
        
        # Create a simple build script
        cat > dist/zeta-source/BUILD.md << 'EOF'
        # Building Zeta from Source
        
        ## Prerequisites
        - Rust toolchain (stable or nightly)
        - LLVM 21 development libraries
        
        ## Build Steps
        1. Clone this repository
        2. Run: `cargo build --release --bin zetac`
        3. The compiler will be at `target/release/zetac`
        
        ## Testing
        Run: `cargo test --release`
        
        ## Bootstrap Chain
        This Zeta source can compile itself using the Rust-based compiler.
        The bootstrap chain is: Rust v0.3.7 → Zeta v0.3.8 → Zeta v0.4.x → Zeta v0.5.0
        EOF
        
        # Create tarball of Zeta source
        tar -czf dist/zeta-source-v${{ github.ref_name }}.tar.gz -C dist zeta-source
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Zeta ${{ github.ref_name }}
        body: |
          # Zeta ${{ github.ref_name }}
          
          ## Pure Zeta Implementation Release
          
          This release contains:
          - Zeta compiler binary (Linux)
          - Complete Zeta source code
          - Bootstrap chain validation
          
          ### Bootstrap Status
          The bootstrap chain is complete:
          - Rust v0.3.7 → Zeta v0.3.8 → Zeta v0.4.x → Zeta v0.5.0
          
          ### What's New
          - Pure Zeta implementation (self-hosting)
          - Complete operator support
          - Unicode identifier support
          - Enhanced error reporting
          
          ### Getting Started
          1. Download the zeta-source tarball
          2. See BUILD.md for compilation instructions
          3. The Rust-based compiler is included for bootstrap
          
          ### Repository Structure
          This repository contains both Rust and Zeta source to maintain
          the bootstrap chain. See DECISION_LOG.md for details.
        files: |
          dist/zeta-source-v${{ github.ref_name }}.tar.gz
          target/release/zetac
        draft: false
        prerelease: false
        generate_release_notes: true
    
    - name: Upload Zeta compiler artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeta-compiler-${{ github.ref_name }}
        path: |
          target/release/zetac
          dist/zeta-source-v${{ github.ref_name }}.tar.gz
        retention-days: 30